    <script>
        function wrapText(str, maxLength) {
            let words = str.split(' ');
            let lines = [];
            let currentLine = '';
            words.forEach(word => {
                if ((currentLine + word).length > maxLength) {
                    if (currentLine) lines.push(currentLine.trim());
                    currentLine = word + ' ';
                } else {
                    currentLine += word + ' ';
                }
            });
            if (currentLine) lines.push(currentLine.trim());
            return lines.join('\n');
        }

        // Парсинг данных
        const rawText = document.getElementById('rawData').textContent;
        const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        let data = [];
        let currentBlock = null;
        let currentCategory = null;
        let totalWords = 0;

        lines.forEach(line => {
            if (line.startsWith('БЛОК')) {
                currentBlock = {
                    name: line.split(':')[1].trim() + ' (' + line.split(':')[0].replace('БЛОК', '').trim() + ')',
                    children: []
                };
                data.push(currentBlock);
            } else if (/^\d+\./.test(line)) {
                currentCategory = {
                    name: line.replace(/^\d+\./, '').trim(),
                    value: 0,
                    words: [] 
                };
                if (currentBlock) {
                    currentBlock.children.push(currentCategory);
                }
            } else {
                if (currentCategory) {
                    currentCategory.value += 1;
                    currentCategory.words.push(line);
                    totalWords += 1;
                }
            }
        });

        // 1. Диаграмма Sunburst
        const sunburstDom = document.getElementById('sunburst-container');
        const sunburstChart = echarts.init(sunburstDom);
        
        const sunburstOption = {
            color: ['#2A4B7C', '#8A3324', '#3E6B48', '#D48C29', '#63426A', '#2D758C', '#9E4E24'],
            tooltip: {
                trigger: 'item',
                formatter: function (params) {
                    let count = params.value;
                    let percentage = ((count / totalWords) * 100).toFixed(1);
                    return `${params.name}<br/><b>${count}</b> терминов (${percentage}%)`;
                }
            },
            series: {
                type: 'sunburst',
                data: data,
                radius: [0, '95%'],
                label: {
                    rotate: 'radial',
                    color: '#333'
                },
                itemStyle: {
                    borderRadius: 5,
                    borderWidth: 2,
                    borderColor: '#fff'
                },
                emphasis: { focus: 'ancestor' },
                levels: [
                    {},
                    { 
                        r0: '15%', r: '45%',
                        itemStyle: { borderWidth: 2 },
                        label: {
                            rotate: 'tangential',
                            align: 'center',
                            fontSize: 14,
                            fontWeight: 'bold',
                            formatter: function(params) {
                                return wrapText(params.name, 18);
                            }
                        }
                    },
                    { 
                        r0: '45%', r: '90%',
                        label: {
                            align: 'right',
                            fontSize: 11,
                            formatter: function(params) {
                                return wrapText(params.name, 22);
                            }
                        },
                        itemStyle: { borderWidth: 1 }
                    }
                ]
            }
        };
        sunburstChart.setOption(sunburstOption);

        // 2. Столбчатая диаграмма
        const barDom = document.getElementById('bar-container');
        const barChart = echarts.init(barDom);
        
        const barOption = {
            color: ['#6BAED6', '#3182BD', '#08519C'],
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' }
            },
            legend: {
                data: ['nomina substantiva', 'nomina adiectiva', 'verba et adverbia'],
                bottom: 0,
                textStyle: { fontSize: 14 }
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '10%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                data: ['IV до н.э.', 'III до н.э.', 'II до н.э.', 'I до н.э.', 'I н.э.', 'II н.э.', 'III н.э.', 'IV н.э.', 'V н.э.', 'VI н.э.'],
                axisLabel: { interval: 0, rotate: 30 }
            },
            yAxis: { type: 'value' },
            series: [
                {
                    name: 'nomina substantiva',
                    type: 'bar',
                    stack: 'total',
                    emphasis: { focus: 'series' },
                    data: [0, 1, 19, 21, 85, 155, 81, 94, 73, 49]
                },
                {
                    name: 'nomina adiectiva',
                    type: 'bar',
                    stack: 'total',
                    emphasis: { focus: 'series' },
                    data: [0, 1, 6, 9, 9, 18, 10, 13, 8, 8]
                },
                {
                    name: 'verba et adverbia',
                    type: 'bar',
                    stack: 'total',
                    emphasis: { focus: 'series' },
                    data: [0, 0, 0, 0, 2, 0, 1, 2, 4, 4]
                }
            ],
            animationEasing: 'elasticOut',
            animationDelayUpdate: function (idx) { return idx * 50; }
        };
        barChart.setOption(barOption);

        // Ресайз графиков
        window.addEventListener('resize', function() {
            sunburstChart.resize();
            barChart.resize();
        });

        // Модальное окно и парсинг гиперссылок
        const modal = document.getElementById("wordModal");
        const closeBtn = document.getElementsByClassName("close-btn")[0];
        const modalTitle = document.getElementById("modalTitle");
        const modalBody = document.getElementById("modalBody");

        sunburstChart.on('click', function (params) {
            if (params.data && params.data.words && params.data.words.length > 0) {
                let percentage = ((params.data.words.length / totalWords) * 100).toFixed(1);
                modalTitle.textContent = `${params.name} (${params.data.words.length} слов, ${percentage}%)`;
                modalBody.innerHTML = ''; 
                
                params.data.words.forEach(wordLine => {
                    let divIndex = wordLine.indexOf('(');
                    if (divIndex === -1) divIndex = wordLine.indexOf('—');
                    if (divIndex === -1) divIndex = wordLine.length;

                    let greekPart = wordLine.substring(0, divIndex);
                    let restPart = wordLine.substring(divIndex);

                    greekPart = greekPart.replace(/([^\s,\d]+)/g, function(match) {
                        let cleanWord = match.trim();
                        return `<a href="https://logeion.uchicago.edu/${encodeURIComponent(cleanWord)}" class="greek-link" target="_blank">${cleanWord}</a>`;
                    });

                    restPart = restPart.replace(/\[лат\.\s+([^\]]+)\]/, function(fullMatch, latinString) {
                        let linkedLatin = latinString.replace(/[a-zA-Z]+/g, function(latWord) {
                            return `<a href="https://logeion.uchicago.edu/${encodeURIComponent(latWord)}" class="latin-link" target="_blank">${latWord}</a>`;
                        });
                        return `[лат. ${linkedLatin}]`;
                    });

                    let div = document.createElement('div');
                    div.className = 'term-row';
                    div.innerHTML = greekPart + restPart;
                    modalBody.appendChild(div);
                });
                
                modal.style.display = "block";
            }
        });

        closeBtn.onclick = function() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) modal.style.display = "none"; }
    </script>
</body>
</html>
